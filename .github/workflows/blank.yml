name: ci-cd-practice

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "24"

jobs:
  backend-test-build:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgres://test:test@localhost:5432/test-db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_DB
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: Node-setup
        uses: actions/setup-node@v4
        with:
          node-version: ${{env.NODE_VERSION}}
          cache: npm
          cache-dependency-path: ./package-lock.json

      - name: installing-packages
        run: npm ci

      - name: run-lint
        run: npm run lint

      - name: run-test
        run: npm run test

      - name: build
        run: npm run build

  docker-setup:
    needs: [backend-test-build]
    runs-on: ubuntu-latest

    steps:
      - name: checkout-code
        uses: actions/checkout@v4

      - name: docker builx-setup
        uses: docker/setup-buildx-action@v3

      - name: docker-login
        uses: docker/login-action@v4
        with:
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}

      - name: build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{secrets.USERNAME}}/my-app:latest

  server-deployment:
    needs: [docker-setup]
    runs-on: ubuntu-latest

    steps:
      - name: ssh-into-server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{secrets.SERVER_HOST}}
          username: ${{secrets.USER}}
          key: ${{secrets.KEY}}
          script: |
            docker pull kaiju20/my-app:latest
            docker stop my-app || true
            docker rm my-app || true
            docker run -d -p 80:3000 --name my-app kaiju20/my-app:latest
